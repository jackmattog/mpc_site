{% extends 'base.html' %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center py-16 px-4 sm:px-6 lg:px-8">
    <div class="max-w-xl w-full text-center">
        
        <!-- Animated 404 Graphic -->
        <div class="relative mb-8">
            <h1 class="text-9xl font-black text-gray-100 tracking-widest select-none">
                404
            </h1>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="bg-green-100 p-4 rounded-full">
                    <!-- Search Icon with a Question Mark -->
                    <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" 
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 
                        4.242zM21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Error Messaging -->
        <h2 class="text-3xl font-extrabold text-gray-900 mb-4 tracking-tight">
            Page Not Found
        </h2>
        <p class="text-lg text-gray-500 mb-8 leading-relaxed">
            It looks like this page got lost in the field. 
            The link you clicked might be broken, or the product you are looking for has been moved.
        </p>

        <!-- Recovery Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <!-- Go Back to Home -->
            <a href="{% url 'core:home' %}" class="w-full sm:w-auto px-8 py-3.5 bg-green-600 
            hover:bg-green-500 text-white font-bold rounded-xl shadow-lg shadow-green-600/20 
            active:scale-95 transition-all flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Homepage
            </a>
            
            <!-- Secondary Action: Contact -->
            <a href="{% url 'core:contacts' %}" class="w-full sm:w-auto px-8 py-3.5 bg-white border 
            border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 
            font-bold rounded-xl active:scale-95 transition-all">
                Contact Support
            </a>
        </div>

    </div>
</section>
{% endblock %}

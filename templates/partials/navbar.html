<!--Js for desktop search-->
<script>
  const searchInput = document.getElementById('search-input');

  // Using focus/blur for automatic expansion
  searchInput.addEventListener('focus', () => {
    searchInput.classList.replace('w-64', 'w-96');
  });

  searchInput.addEventListener('blur', () => {
    searchInput.classList.replace('w-96', 'w-64');
  });
</script>

<!--Js for menu-->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const menuBtn = document.getElementById('menu-btn');
    const menuDropdown = document.getElementById('menu-dropdown');

    if (menuBtn && menuDropdown) {
        menuBtn.addEventListener('click', (e) => {
            // Prevent the click from immediately bubbling up to document
            e.stopPropagation(); 
            menuDropdown.classList.toggle('hidden');
        });

        //Close the menu if the user clicks anywhere else on the screen
        document.addEventListener('click', (e) => {
            if (!menuDropdown.contains(e.target) && e.target !== menuBtn) {
                menuDropdown.classList.add('hidden');
            }
        });
    }
});
</script>

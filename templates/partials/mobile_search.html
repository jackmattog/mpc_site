<!-- Mobile Sticky Top Search Bar (Hidden on desktop, sticky on top for mobile) -->
<div class="sm:hidden fixed top-0 left-0 w-full h-15 
bg-white border-b border-gray-200 shadow-sm z-50 flex items-center px-4">
    <form action="{% url 'core:search_results' %}" method="GET" class="relative w-full">
        <input
            name="q"
            id="mobile-search-input"
            class="border border-green-600 rounded-full w-full pl-4 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 shadow-sm bg-gray-50/50"
            type="text"
            placeholder="Search products..."
            required>
        <button type="submit" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-500 hover:text-green-600 transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </button>
    </form>
</div>
